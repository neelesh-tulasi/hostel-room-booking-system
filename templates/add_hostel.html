```html
{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg">

            <div class="card-header bg-primary text-white text-center">

                <h3>Add New Hostel</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Hostel Name
                        </label>

                        <input
                            type="text"
                            name="hostel_name"
                            class="form-control"
                            placeholder="Enter hostel name"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Hostel Type
                        </label>

                        <select
                            name="gender"
                            class="form-select"
                            required>

                            <option value="">Select Hostel Type</option>

                            <option value="Male">
                                Boys Hostel
                            </option>

                            <option value="Female">
                                Girls Hostel
                            </option>

                        </select>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Add Hostel

                        </button>

                    </div>

                </form>

            </div>

            <div class="card-footer text-center">

                <a href="/hostels"
                   class="btn btn-success">

                    View All Hostels

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
```
