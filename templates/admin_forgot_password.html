{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    <h3>Forgot Password</h3>

                </div>


                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label>
                                Enter Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>


                        <button class="btn btn-dark">
                            Send Request
                        </button>


                        <a href="/admin"
                           class="btn btn-secondary">
                            Back
                        </a>


                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
