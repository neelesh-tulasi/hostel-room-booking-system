{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg">

            <div class="card-header bg-dark text-white text-center">

                <h3>Administrator Login</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter admin username"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter admin password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-dark btn-lg">

                            Login

                        </button>

                    </div>

                </form>

            </div>

            <div class="card-footer text-center">

                <a href="/">
                    ← Back to Home
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
