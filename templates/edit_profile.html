```html
{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">


<div class="card shadow">


<div class="card-header bg-primary text-white text-center">

<h3>
Edit Profile
</h3>

</div>


<div class="card-body">


<form method="POST">


<div class="mb-3">

<label class="form-label">
Name
</label>

<input type="text"
name="name"
class="form-control"
value="{{ student['name'] }}"
required>

</div>



<div class="mb-3">

<label class="form-label">
Email
</label>

<input type="email"
name="email"
class="form-control"
value="{{ student['email'] }}"
required>

</div>



<div class="mb-3">

<label class="form-label">
Phone
</label>

<input type="text"
name="phone"
class="form-control"
value="{{ student['phone'] }}"
required>

</div>


<div class="mb-3">

<label class="form-label">
New Password
</label>

<input
    type="password"
    name="password"
    class="form-control"
    placeholder="Enter a new password"
    required>

</div>



<button class="btn btn-primary w-100">

Update Profile

</button>


</form>


</div>


</div>


</div>

</div>


{% endblock %}
```
