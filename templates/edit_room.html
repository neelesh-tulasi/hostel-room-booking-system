```html
{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg">

            <div class="card-header bg-warning text-dark text-center">

                <h3>Edit Room</h3>

            </div>


            <div class="card-body">

                <form method="POST">


                    <div class="mb-3">

                        <label class="form-label">
                            Room Number
                        </label>

                        <input
                            type="text"
                            name="room_number"
                            class="form-control"
                            value="{{ room['room_number'] }}"
                            required>

                    </div>


                    <div class="mb-3">

                        <label class="form-label">
                            Capacity
                        </label>

                        <input
                            type="number"
                            name="capacity"
                            class="form-control"
                            min="1"
                            value="{{ room['capacity'] }}"
                            required>

                    </div>


                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-warning btn-lg">

                            Update Room

                        </button>

                    </div>


                </form>

            </div>


            <div class="card-footer text-center">

                <a href="/view_rooms"
                   class="btn btn-secondary">

                    ← Back to Rooms

                </a>

            </div>


        </div>

    </div>

</div>


{% endblock %}
```
