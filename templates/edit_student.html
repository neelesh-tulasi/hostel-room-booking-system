<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">

    <input type="text" name="name" value="{{ student[0] }}" required><br><br>

    <input type="text" name="department" value="{{ student[2] }}" required><br><br>

    <input type="text" name="year" value="{{ student[3] }}" required><br><br>

    <input type="text" name="gender" value="{{ student[4] }}" required><br><br>

    <input type="email" name="email" value="{{ student[5] }}" required><br><br>

    <input type="text" name="phone" value="{{ student[6] }}" required><br><br>

    <input type="submit" value="Update Student">

</form>

</body>
</html>
