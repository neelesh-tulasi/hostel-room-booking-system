{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h3>Edit Student</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ student['name'] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input
                        type="text"
                        name="department"
                        class="form-control"
                        value="{{ student['department'] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Year</label>
                    <input
                        type="number"
                        name="year"
                        class="form-control"
                        value="{{ student['year'] }}"
                        min="1"
                        max="4"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>

                    <select
                        name="gender"
                        class="form-select"
                        required>

                        <option value="Male"
                        {% if student['gender']=="Male" %}selected{% endif %}>
                            Male
                        </option>

                        <option value="Female"
                        {% if student['gender']=="Female" %}selected{% endif %}>
                            Female
                        </option>

                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ student['email'] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input
                        type="tel"
                        name="phone"
                        class="form-control"
                        value="{{ student['phone'] }}"
                        required>
                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    Update Student

                </button>

                <a href="/students"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
