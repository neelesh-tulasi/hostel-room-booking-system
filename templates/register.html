<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h2 style="text-align:center;">Student Registration</h2>

<form action="/register" method="POST">

    <input type="text" name="name" placeholder="Full Name" required><br><br>

    <input type="text" name="rollno" placeholder="Roll Number" required><br><br>

    <input type="text" name="department" placeholder="Department" required><br><br>

    <input type="text" name="year" placeholder="Year" required><br><br>

    <input type="text" name="gender" placeholder="Gender" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input type="text" name="phone" placeholder="Phone Number" required><br><br>

    <input type="password" name="password" placeholder="Password" required><br><br>

    <input type="submit" value="Register">

</form>

</body>
</html>
