```html
{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-success text-white text-center">
                <h3>Student Registration</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text"
                                   name="rollno"
                                   class="form-control"
                                   required>
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Department</label>

                            <select name="department"
                                    class="form-select"
                                    required>

                                <option value="">Select Department</option>
                                <option>CSE</option>
                                <option>ECE</option>
                                <option>EEE</option>
                                <option>MECH</option>
                                <option>CIVIL</option>
                                <option>AIML</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Year</label>

                            <select name="year"
                                    class="form-select"
                                    required>

                                <option value="">Select Year</option>
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>

                            </select>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Gender</label>

                            <select name="gender"
                                    class="form-select"
                                    required>

                                <option value="">Select Gender</option>
                                <option>Male</option>
                                <option>Female</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>

                            <input type="tel"
                                   name="phone"
                                   class="form-control"
                                   maxlength="10"
                                   required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Email Address</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Password</label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <div class="d-grid">

                        <button type="submit"
                                class="btn btn-success btn-lg">

                            Register

                        </button>

                    </div>

                </form>

            </div>

            <div class="card-footer text-center">

                Already have an account?

                <a href="/login">
                    Student Login
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
```
