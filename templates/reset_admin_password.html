{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">


<div class="card-header bg-warning">

<h3>
Reset Password
</h3>

</div>


<div class="card-body">


<p>
Admin:
<b>{{ admin["name"] }}</b>
</p>

<p>
Username:
<b>{{ admin["username"] }}</b>
</p>


<form method="POST">


<div class="mb-3">

<label>
New Password
</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>


<button class="btn btn-warning">
Update Password
</button>


<a href="/password_reset_requests"
class="btn btn-secondary">
Cancel
</a>


</form>


</div>


</div>

</div>

</div>

</div>


{% endblock %}
